name: Promotion

permissions:
  contents: write
  pull-requests: write

on:
    workflow_run:
        workflows: ["Deploy"]
        types:
            - completed
        branches:
          - dev
          - it
          - qa

jobs:
  promote:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        
      - name: Determine Promotion Path
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: bash ./.github/workflows/scripts/promotion.sh
