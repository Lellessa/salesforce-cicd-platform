name: Validate

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - dev
      - it
      - qa
      - prod

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authentication
        env:
          JWT_KEY: ${{ secrets.JWT_KEY }}
          CONSUMER_KEY: ${{ vars.CONSUMER_KEY }}
          USERNAME: ${{ vars.USERNAME }}
          URL: ${{ vars.URL }}
          ORG_ALIAS: ${{ vars.ORG_ALIAS }}
        run: bash ./.github/workflows/scripts/auth.sh

      - name: Validate
        env:
          ORG_ALIAS: ${{ vars.ORG_ALIAS }}
          TEST_LEVEL: ${{ vars.TEST_LEVEL }}
        run: bash ./.github/workflows/scripts/validate.sh


      - name: Upload validate summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validate-summary
          path: validate.json

  comment:
    needs: validate
    if: always()
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download validate summary
        uses: actions/download-artifact@v4
        with:
          name: validate-summary

      - name: Build validate report
        run: bash .github/workflows/scripts/build_validation_report.sh validate.json

      - name: Comment PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --body-file validate_report.md