name: Static Analysis

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - dev
      - it
      - qa
      - prod

jobs:
  pmd:
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download PMD
        run: |
          curl -L https://github.com/pmd/pmd/releases/download/pmd_releases/7.15.0/pmd-dist-7.15.0-bin.zip -o pmd.zip
          unzip pmd.zip

      - name: Find changed Apex files
        id: changed
        run: |
          FILES=$(git diff --diff-filter=d --name-only \
            origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(cls|trigger)$' \
            | paste -sd "," -)

          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run PMD
        if: steps.changed.outputs.files != ''
        run: |
          ./pmd-bin-7.15.0/bin/pmd check \
            -d "${{ steps.changed.outputs.files }}" \
            -R rulesets/apex/quickstart.xml \
            -f xml \
            -r pmd-report.xml || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: pmd-report.xml

  ai:
    needs: pmd
    runs-on: ubuntu-latest

    permissions:
      models: read
      contents: read

    steps:

      - name: Check out repository
        uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: pmd-report

      - name: Build prompt
        run: |
          python3 .github/workflows/scripts/build_prompt.py

      - name: Review PMD report
        id: review
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1
          system-prompt: |
            You are a Salesforce Technical Architect.

            Your job is to review PMD findings.

            Explain every issue in simple language.

            Suggest fixes.

            When appropriate provide corrected Apex code.

            Return ONLY GitHub Markdown.

          prompt-file: prompt.txt

      - name: Save review
        run: |
          cat <<'EOF' > ai-review.md
          ${{ steps.review.outputs.response }}
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: ai-review
          path: ai-review.md

  comment:
    needs: ai
    if: always()
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Download AI review
        uses: actions/download-artifact@v4
        with:
          name: ai-review

      - name: Comment PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --body-file ai-review.md