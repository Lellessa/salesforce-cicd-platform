name: Static Analysis

permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - dev
      - it
      - qa
      - prod

jobs:
  pmd:
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download PMD
        run: |
          curl -L https://github.com/pmd/pmd/releases/download/pmd_releases/7.15.0/pmd-dist-7.15.0-bin.zip -o pmd.zip
          unzip pmd.zip

      - name: Run PMD
        run: |
          mkdir reports

          ./pmd-bin-7.15.0/bin/pmd check \
            -d force-app \
            -R rulesets/apex/quickstart.xml \
            -f sarif \
            -r pmd-report.sarif || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: pmd-report.sarif

  comment:
    needs: pmd
    if: always()
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Download PMD analysis
        uses: actions/download-artifact@v4
        with:
          name: pmd-report

      - name: Comment PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --body "$(printf '## PMD Analysis\n\n```\n%s\n```' "$(cat pmd-report.sarif)")"